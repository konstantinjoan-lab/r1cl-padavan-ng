name: Build Padavan NG for R1CL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your configs
        uses: actions/checkout@v4

      - name: Checkout Padavan-NG
        uses: actions/checkout@v4
        with:
          repository: hadzhioglu/padavan-ng
          path: padavan-ng
          ref: master

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt upgrade -y
          sudo apt install -y build-essential gawk flex bison unzip git fakeroot autoconf automake libtool

      - name: Fix fakeroot mode
        run: |
          sudo update-alternatives --set fakeroot /usr/bin/fakeroot-tcp 2>/dev/null || true

      - name: Rebuild libcap-ng without Python
        run: |
          cd padavan-ng/libs/libcap-ng
          # Удаляем старую сборку
          rm -rf libcap-ng-0.8.5
          # Распаковываем исходники
          tar -xf libcap-ng-0.8.5.tar.gz
          cd libcap-ng-0.8.5
          # Конфигурируем с отключением Python
          ./configure --host=mipsel-linux --prefix=/ --disable-python --enable-static --disable-shared
          make -j$(nproc)
          make install DESTDIR=$(pwd)/../../stage
          cd ..

      - name: Copy configuration for R1CL
        run: |
          cd padavan-ng/trunk
          cp configs/templates/xiaomi/mi-nano.config .config
          echo "Config copied from mi-nano.config"

      - name: Build firmware
        run: |
          cd padavan-ng/trunk
          fakeroot ./build_firmware.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: R1CL-firmware-${{ github.run_id }}
          path: padavan-ng/trunk/images/*.trx
