name: Build Padavan NG for R1CL

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  workflow_dispatch:

jobs:
  dryrun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check structure
        run: |
          test -f configs/board.h
          test -f configs/partition.map
          test -f configs/wifi_eeprom.map
          test -f configs/.config
          test -f patches/mt7628_led_fix.patch
          echo "Structure OK"

  build:
    needs: dryrun
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gawk flex bison unzip git

      - name: Checkout Padavan-NG
        uses: actions/checkout@v4
        with:
          repository: padavan-ng/padavan-ng
          path: padavan-ng
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy configs and patch
        run: |
          cp -r configs padavan-ng/trunk/configs/boards/MI-R1CL
          cp patches/mt7628_led_fix.patch padavan-ng/trunk/user/shared/mt_wifi/mt7628/

      - name: Build firmware
        run: |
          cd padavan-ng/trunk
          fakeroot ./build_firmware.sh MI-R1CL

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: R1CL-firmware-${{ github.run_id }}
          path: padavan-ng/trunk/images/*.trx
