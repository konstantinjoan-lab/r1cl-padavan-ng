name: Build Padavan NG for R1CL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout padavan-ng (fork by ihackmen)
        uses: actions/checkout@v4
        with:
          repository: ihackmen/padavan-ng
          path: padavan-ng
          ref: master

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential gawk flex bison unzip git fakeroot

      - name: Configure for R1CL
        run: |
          cd padavan-ng/trunk
          cp configs/templates/xiaomi/mi-nano.config .config
          echo "CONFIG_FIRMWARE_PRODUCT_ID=MI-R1CL" >> .config

      - name: Build firmware (without fakeroot wrapper)
        run: |
          cd padavan-ng/trunk
          # Прямой вызов без fakeroot
          ./build_firmware.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: R1CL-firmware
          path: padavan-ng/trunk/images/*.trx
