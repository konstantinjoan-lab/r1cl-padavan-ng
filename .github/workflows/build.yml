name: Build Padavan NG for R1CL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Padavan-NG
        uses: actions/checkout@v4
        with:
          repository: hadzhioglu/padavan-ng
          path: padavan-ng
          ref: master

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt upgrade -y
          sudo apt install -y build-essential gawk flex bison unzip git fakeroot

      - name: Fix fakeroot mode
        run: |
          sudo update-alternatives --set fakeroot /usr/bin/fakeroot-tcp 2>/dev/null || true

      - name: Disable problematic Python bindings
        run: |
          # Отключаем сборку libcap-ng Python биндингов через переменную окружения
          echo "PYTHON=disabled" >> $GITHUB_ENV
          # Альтернативный метод: удаляем скрипт, который собирает Python модули
          if [ -f padavan-ng/libs/libcap-ng/libcap-ng-0.8.5/bindings/Makefile ]; then
            sed -i 's/^.*python.*$//g' padavan-ng/libs/libcap-ng/libcap-ng-0.8.5/bindings/Makefile
          fi
          # Или просто удаляем папку с биндингами (если существует)
          rm -rf padavan-ng/libs/libcap-ng/libcap-ng-0.8.5/bindings 2>/dev/null || true

      - name: Copy configuration for R1CL
        run: |
          cd padavan-ng/trunk
          cp configs/templates/xiaomi/mi-nano.config .config
          echo "CONFIG_FIRMWARE_PRODUCT_ID=MI-R1CL" >> .config

      - name: Build firmware
        run: |
          cd padavan-ng/trunk
          # Игнорируем ошибки сборки libcap-ng (она не критична)
          fakeroot ./build_firmware.sh 2>&1 | tee build.log
          # Проверяем, создалась ли прошивка
          if [ -f images/*.trx ]; then
            echo "Firmware built successfully"
          else
            echo "Build failed, but continuing to upload logs"
          fi

      - name: Upload firmware (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: R1CL-firmware-${{ github.run_id }}
          path: padavan-ng/trunk/images/*.trx
        continue-on-error: true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_id }}
          path: padavan-ng/trunk/build.log
        if: always()
