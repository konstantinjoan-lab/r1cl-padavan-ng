name: Build Padavan NG for R1CL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Padavan-NG
        uses: actions/checkout@v4
        with:
          repository: hadzhioglu/padavan-ng
          path: padavan-ng
          ref: master

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt upgrade -y
          sudo apt install -y autoconf autoconf-archive automake autopoint bison build-essential ca-certificates cmake cpio curl doxygen fakeroot flex gawk gettext git gperf help2man htop kmod libblkid-dev libc-ares-dev libcurl4-openssl-dev libdevmapper-dev libev-dev libevent-dev libexif-dev libflac-dev libgmp3-dev libid3tag0-dev libidn2-dev libjpeg-dev libkeyutils-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libogg-dev libsqlite3-dev libssl-dev libtool libtool-bin libudev-dev libunbound-dev libvorbis-dev libxml2-dev locales mc nano pkg-config ppp-dev python3 python3-docutils sshpass texinfo unzip uuid uuid-dev vim wget xxd zlib1g-dev

      - name: Set fakeroot mode
        run: |
          sudo update-alternatives --set fakeroot /usr/bin/fakeroot-tcp 2>/dev/null || true

      - name: Build firmware directly
        run: |
          cd padavan-ng/trunk
          fakeroot ./build_firmware.sh MI-R1CL

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: R1CL-firmware
          path: padavan-ng/trunk/images/*.trx
