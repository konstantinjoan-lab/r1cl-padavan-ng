name: Build Padavan NG for R1CL

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Padavan-NG source code
        uses: actions/checkout@v4
        with:
          repository: hadzhioglu/padavan-ng
          path: padavan-ng
          ref: master

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt upgrade -y
          # Обновленный список пакетов для надежности
          sudo apt install -y autoconf autoconf-archive automake autopoint bison build-essential ca-certificates cmake cpio curl dos2unix doxygen fakeroot flex gawk gettext git gperf help2man htop kmod libarchive-tools libblkid-dev libc-ares-dev libcurl4-openssl-dev libdevmapper-dev libev-dev libevent-dev libexif-dev libflac-dev libgmp3-dev libid3tag0-dev libidn2-dev libjpeg-dev libkeyutils-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libogg-dev libsqlite3-dev libssl-dev libsystemd-dev libtool libtool-bin libudev-dev libunbound-dev libvorbis-dev libxml2-dev locales mc nano pkg-config ppp-dev python3 python3-docutils sshpass texinfo unzip uuid uuid-dev vim wget xxd zlib1g-dev

      - name: Fix fakeroot mode
        run: |
          sudo update-alternatives --set fakeroot /usr/bin/fakeroot-tcp 2>/dev/null || true

      - name: Copy configuration for Xiaomi R1CL
        run: |
          cd padavan-ng/trunk
          # Копируем готовый шаблон конфигурации для Xiaomi Mi Router R1CL
          # Если точного файла mi-r1cl.config нет, пробуем mi-r1c.config или ищем в папке xiaomi
          if [ -f configs/templates/xiaomi/mi-r1cl.config ]; then
            cp configs/templates/xiaomi/mi-r1cl.config .config
          elif [ -f configs/templates/xiaomi/mi-r1c.config ]; then
            cp configs/templates/xiaomi/mi-r1c.config .config
          else
            echo "::error::Config template for MI-R1CL not found!"
            ls -la configs/templates/xiaomi/ || true
            exit 1
          fi
          echo "Config file .config created successfully."

      - name: Build firmware
        run: |
          cd padavan-ng/trunk
          fakeroot ./build_firmware.sh

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: R1CL-firmware-${{ github.run_id }}
          path: padavan-ng/trunk/images/*.trx
